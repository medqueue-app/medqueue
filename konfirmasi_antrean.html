<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface shadow-sm w-full top-0 sticky flex items-center justify-between px-container-padding h-16 z-50">
<button onclick="window.history.back()" class="text-on-surface-variant hover:bg-surface-container-low transition-colors rounded-full p-2 active:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary flex-1 text-center mr-10">Konfirmasi Antrean</h1>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-container-padding py-stack-lg max-w-lg mx-auto w-full flex flex-col gap-stack-lg">
<!-- Illustration / Header -->
<div class="text-center">
<div class="w-24 h-24 mx-auto bg-primary-container rounded-full flex items-center justify-center mb-stack-md">
<span class="material-symbols-outlined text-4xl text-on-primary-container" data-icon="stethoscope" style="font-variation-settings: 'FILL' 1;">stethoscope</span>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Detail Antrean</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Mohon periksa kembali detail antrean Anda sebelum melanjutkan.</p>
</div>
<!-- Details Card -->
<section class="bg-surface-container-lowest rounded-xl p-stack-md shadow-[0px_4px_12px_rgba(0,0,0,0.05)] border border-surface-variant">
<div class="flex flex-col gap-stack-md">
<!-- Polyclinic -->
<div class="flex items-start gap-3">
<div class="mt-1">
<span class="material-symbols-outlined text-primary" data-icon="local_hospital">local_hospital</span>
</div>
<div>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase">Poli Tujuan</p>
<p id="confirmPoliName" class="font-body-lg text-body-lg text-on-surface font-semibold">Poli Umum</p>
</div>
</div>
<hr class="border-surface-variant">
<!-- Doctor -->
<div class="flex items-start gap-3">
<div class="mt-1">
<span class="material-symbols-outlined text-primary" data-icon="person">person</span>
</div>
<div>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase">Dokter</p>
<p id="confirmDoctorName" class="font-body-lg text-body-lg text-on-surface font-semibold">dr. Budi Santoso</p>
</div>
</div>
<hr class="border-surface-variant">
<!-- Date -->
<div class="flex items-start gap-3">
<div class="mt-1">
<span class="material-symbols-outlined text-primary" data-icon="calendar_today">calendar_today</span>
</div>
<div>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase">Tanggal</p>
<p class="font-body-lg text-body-lg text-on-surface font-semibold">Hari ini, 24 Okt 2023</p>
</div>
</div>
<hr class="border-surface-variant">
<!-- Est Wait Time -->
<div class="flex items-start gap-3">
<div class="mt-1">
<span class="material-symbols-outlined text-secondary" data-icon="schedule">schedule</span>
</div>
<div>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase">Estimasi Waktu Tunggu</p>
<p class="font-body-lg text-body-lg text-secondary font-semibold">± 30 Menit</p>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Actions (Floating/Sticky) -->
<div class="bg-surface px-container-padding py-stack-md border-t border-surface-variant sticky bottom-0 w-full max-w-lg mx-auto flex flex-col gap-stack-sm">
<button id="confirmRegisterBtn" class="w-full bg-primary text-on-primary font-headline-md text-headline-md py-3 rounded-lg hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all min-h-[44px]">
            Lanjutkan
        </button>
<button onclick="window.location.href='ambil_antrean_pilih_poli.html'" class="w-full bg-transparent text-primary font-headline-md text-headline-md py-3 rounded-lg hover:bg-surface-container-low active:scale-[0.98] transition-all min-h-[44px]">
            Ubah Poli
        </button>
</div>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    let poli = urlParams.get('poli') || 'Umum';
    
    // Normalize
    poli = poli.charAt(0).toUpperCase() + poli.slice(1);
    const fullPoliName = `Poli ${poli}`;
    
    // Set text elements
    document.getElementById('confirmPoliName').innerText = fullPoliName;
    
    let doctorName = 'dr. Budi Santoso';
    if (poli === 'Umum') {
        doctorName = 'Dr. Sarah Jenkins';
    } else if (poli === 'Anak') {
        doctorName = 'Dr. Amanda Putri, Sp.A';
    } else if (poli === 'Gigi') {
        doctorName = 'Dr. Ronald Cooper';
    }
    document.getElementById('confirmDoctorName').innerText = doctorName;
    
    // Handle Registration Click
    document.getElementById('confirmRegisterBtn').addEventListener('click', () => {
        const userName = localStorage.getItem('userName') || 'Budi Santoso';
        
        // Add to LocalStorage Database
        const newQueue = addPatientQueue(userName, fullPoliName);
        
        // Redirect to active ticket barcode view
        window.location.href = 'barcode_status_antrean.html';
    });
});
</script>
