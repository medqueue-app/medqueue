<script>
document.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    let poli = urlParams.get('poli') || 'Umum';
    poli = poli.charAt(0).toUpperCase() + poli.slice(1);
    const fullPoliName = `Poli ${poli}`;
    
    document.getElementById('confirmPoliName').innerText = fullPoliName;
    
    // Ganti nama dokter agar cocok dengan halaman sebelumnya
    let doctorName = 'Dr. Nita Astuti';
    if (poli === 'Umum') doctorName = 'Dr. Nita Astuti';
    else if (poli === 'Anak') doctorName = 'Dr. Rani Mutiara, Sp.A';
    else if (poli === 'Gigi') doctorName = 'Dr. Ronald Cooper';
    
    document.getElementById('confirmDoctorName').innerText = doctorName;
    
    document.getElementById('confirmRegisterBtn').addEventListener('click', (e) => {
        e.preventDefault(); 
        try {
            const userName = localStorage.getItem('userName') || 'Pasien Umum';
            const newQueue = addPatientQueue(userName, fullPoliName);
            window.location.href = 'barcode_status_antrean.html';
        } catch (error) {
            console.error("Error creating queue:", error);
            alert("Terjadi kesalahan saat mengambil antrean. Coba ulangi kembali atau hubungi petugas.");
        }
    });
});
</script>
