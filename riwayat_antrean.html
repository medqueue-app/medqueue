<!-- Main Content -->
<main class="flex-1 w-full max-w-3xl mx-auto px-container-padding pt-stack-lg">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-stack-lg">Riwayat Antrean</h1>
<div id="historyListContainer" class="flex flex-col gap-card-gap">

</div>
<!-- Loading / Load More indicator -->

<button class="font-label-caps text-label-caps text-primary px-6 py-3 rounded-full border border-primary/20 hover:bg-primary-fixed/20 transition-colors">

</div>

<!-- BottomNavBar (Mobile Only) - Dynamic based on role -->

</nav>
<script>
// Render navigation based on user role
(function() {
    const role = localStorage.getItem('userRole');
    const nav = document.getElementById('bottomNav');
    if (role === 'admin') {
        nav.innerHTML = `
            <a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-lowest transition-all active:scale-95 duration-200 p-2 rounded-lg w-16" href="dashboard_admin_utama.html">
                <span class="material-symbols-outlined mb-1">dashboard</span>
                <span class="font-label-caps text-[10px] leading-none">Dashboard</span>
            </a>
            <a class="flex flex-col items-center justify-center text-primary font-bold hover:bg-surface-container-lowest transition-all active:scale-95 duration-200 p-2 rounded-lg w-16 after:content-[''] after:w-1 after:h-1 after:bg-primary after:rounded-full after:mt-1" href="riwayat_antrean.html">
                <span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">history</span>
                <span class="font-label-caps text-[10px] leading-none">Riwayat</span>
            </a>
            <a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-lowest transition-all active:scale-95 duration-200 p-2 rounded-lg w-16" href="kelola_daftar_antrean.html?poli=Umum">
                <span class="material-symbols-outlined mb-1">list_alt</span>
                <span class="font-label-caps text-[10px] leading-none">Antrean</span>
            </a>
        `;
    } else {
        nav.innerHTML = `
            <a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-lowest transition-all active:scale-95 duration-200 p-2 rounded-lg w-16" href="dashboard_pasien.html">
                <span class="material-symbols-outlined mb-1">home</span>
                <span class="font-label-caps text-[10px] leading-none">Home</span>
            </a>
            <a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-lowest transition-all active:scale-95 duration-200 p-2 rounded-lg w-16" href="barcode_status_antrean.html">
                <span class="material-symbols-outlined mb-1">hourglass_empty</span>
                <span class="font-label-caps text-[10px] leading-none whitespace-nowrap">My Queue</span>
            </a>
            <a class="flex flex-col items-center justify-center text-primary font-bold hover:bg-surface-container-lowest transition-all active:scale-95 duration-200 p-2 rounded-lg w-16 after:content-[''] after:w-1 after:h-1 after:bg-primary after:rounded-full after:mt-1" href="riwayat_antrean.html">
                <span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">history</span>
                <span class="font-label-caps text-[10px] leading-none">History</span>
            </a>
            <a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-lowest transition-all active:scale-95 duration-200 p-2 rounded-lg w-16 cursor-pointer" href="pengaturan.html">
                <span id="bottomNavProfileIcon" class="material-symbols-outlined mb-1">person</span>
                <span class="font-label-caps text-[10px] leading-none">Profil</span>
            </a>
        `;
    }
})();

<script>
document.addEventListener('DOMContentLoaded', () => {
    // Load dynamic user avatar
    const storedAvatar = localStorage.getItem('userAvatar');
    if (storedAvatar) {
        const avatarImg = document.getElementById('riwayatHeaderAvatar');
        if (avatarImg) avatarImg.src = storedAvatar;
        
        const navIcon = document.getElementById('bottomNavProfileIcon');
        if (navIcon) {
            navIcon.outerHTML = `<img class="w-6 h-6 rounded-full object-cover mb-1 border border-primary/20" src="${storedAvatar}" alt="Avatar">`;
        }
    }

    loadPatientHistory();
});

function loadPatientHistory() {
    const db = typeof getQueueDB === 'function' ? getQueueDB() : null;
    if (!db) return;
    
    // Get logged-in patient's name
    const userName = localStorage.getItem('userName');
    const container = document.getElementById('historyListContainer');
    
    if (!userName) {
        container.innerHTML = `<div class="text-center p-8 text-on-surface-variant">Silakan login untuk melihat riwayat kunjungan.</div>`;
        return;
    }
    
    const historyQueues = db.queues.filter(q => (q.status === 'Selesai' || q.status === 'Dibatalkan') && q.patientName === userName).reverse();
    container.innerHTML = '';
    
    if (historyQueues.length === 0) {
        container.innerHTML = `<div class="text-center p-8 text-on-surface-variant">Belum ada riwayat kunjungan.</div>`;
        return;
    }

    historyQueues.forEach(q => {
        // Map Doctor Names to actual dashboard doctors
        let doctorName = 'Dokter Pemeriksa';
        let icon = 'medical_services';
        if (q.poliName.includes('Umum')) { doctorName = 'Dr. Nita Astuti'; icon = 'stethoscope'; }
        if (q.poliName.includes('Gigi')) { doctorName = 'Dr. Ronald Cooper'; icon = 'dentistry'; }
        if (q.poliName.includes('Anak')) { doctorName = 'Dr. Rani Mutiara, Sp.A'; icon = 'child_care'; }
        if (q.poliName.includes('Jantung')) { doctorName = 'Dr. Hendra Setiawan, Sp.JP'; icon = 'cardiology'; }

        // Date formatting
        const dateObj = new Date(q.timestamp);
        const dateStr = dateObj.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
        const timeStr = dateObj.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) + ' WIB';

        const isSelesai = q.status === 'Selesai';
        const badgeColor = isSelesai ? 'bg-secondary-container' : 'bg-error';
        const badgeText = isSelesai ? 'text-on-surface' : 'text-on-error-container';
        const badgeBg = isSelesai ? 'bg-surface-container bg-opacity-50 border-outline-variant/30' : 'bg-error-container';
        const opacity = isSelesai ? '' : 'opacity-80';

        const cardHTML = `
            <article class="bg-surface-container-lowest rounded-xl p-stack-md shadow-[0px_4px_12px_rgba(0,0,0,0.05)] border border-outline-variant/20 flex flex-col gap-stack-sm hover:shadow-md transition-shadow relative overflow-hidden ${opacity}">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="font-headline-md text-headline-md text-on-surface">${q.poliName}</h2>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="material-symbols-outlined text-[16px] text-on-surface-variant">calendar_today</span>
                            <span class="font-body-md text-body-md text-on-surface-variant">${dateStr}, ${timeStr}</span>
                        </div>
                    </div>
                    <div class="${badgeBg} ${badgeText} font-label-caps text-label-caps px-3 py-1 rounded-full flex items-center gap-1">
                        <span class="w-2 h-2 rounded-full ${badgeColor} inline-block"></span>
                        ${q.status}
                    </div>
                </div>
                <div class="flex items-center gap-3 mt-2 bg-surface p-3 rounded-lg border border-outline-variant/10">
                    <div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center text-on-primary-fixed">
                        <span class="material-symbols-outlined">${icon}</span>
                    </div>
                    <div>
                        <p class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider mb-0.5">Dokter Pemeriksa</p>
                        <p class="font-body-md text-body-md font-medium text-on-surface">${doctorName}</p>
                    </div>
                </div>
                <div class="flex justify-end mt-2 pt-3 border-t border-outline-variant/20">
                    <button class="font-label-caps text-label-caps text-primary hover:bg-primary-fixed/30 px-4 py-2 rounded-lg transition-colors flex items-center gap-1">
                        Lihat Detail
                        <span class="material-symbols-outlined text-[16px]">chevron_right</span>
                    </button>
                </div>
            </article>
        `;
        container.innerHTML += cardHTML;
    });
}
</script>
