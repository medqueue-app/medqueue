<body class="bg-background min-h-screen flex items-center justify-center p-container-padding antialiased">
<!-- Transactional Screen: Suppressing global navigation -->
<main class="w-full max-w-lg">
<!-- Subtle branding area -->
<div class="flex justify-center mb-stack-lg">
<div class="h-16 w-16 bg-primary-container rounded-full flex items-center justify-center shadow-[0px_8px_24px_rgba(0,0,0,0.12)]">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">admin_panel_settings</span>
</div>
</div>
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.05)] overflow-hidden border border-surface-dim">
<!-- Optional subtle image banner for visual interest and to satisfy image requirement -->
<div class="bg-cover bg-center w-full h-24 opacity-80 border-b border-surface-dim" data-alt="A macro shot of a sleek, modern server rack indicator light glowing softly in medical blue, set against a pristine, clinical white background, conveying security, data infrastructure, and high-end professional healthcare technology." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDcVLnvF0nE-GTrXUqCKg9RK5TiO-aMPLtnUibV0EtAN_fCfHizDmaPifrjLwIfg7GcNmLdFFKcjOhr-85hJCDAy2sds3275EjENWaZWCCoXXcuT2Hhx66egw1hMhWcHQV5agCEkFIxdd2wDB05vxcvj-ut6JC_KEAfnaOLMjVU_Txgr1WHMHLh2VZ2hIe6XQ0gDt77jqwMqOAA0D2zDexsWqfPUkokIqj7lm1MB-Yfj_YnJ-rdfRY5b2A_iPMzgGa9z28uA4waQt5V')"></div>
<div class="p-6 md:p-8 flex flex-col gap-stack-lg">
<div class="text-center">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-2">Daftar Akun Admin</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sistem Manajemen Antrean Medis</p>
</div>
<form action="#" class="flex flex-col gap-stack-md" method="POST">
<!-- Nama Lengkap -->
<div class="relative group">
<input class="floating-input" id="nama" name="nama" placeholder=" " required="" type="text">
<label class="floating-label" for="nama">Nama Lengkap</label>
</div>
<!-- NIP / ID Staff -->
<div class="relative group">
<input class="floating-input" id="nip" name="nip" placeholder=" " required="" type="text">
<label class="floating-label" for="nip">NIP / ID Staff</label>
</div>
<!-- Email Institusi -->
<div class="relative group">
<input class="floating-input" id="email" name="email" placeholder=" " required="" type="email">
<label class="floating-label" for="email">Email Institusi</label>
</div>
<!-- Poliklinik Dropdown -->
<div class="relative select-wrapper">
<!-- Standard label for select to maintain visual hierarchy when value is present -->
<label class="absolute font-body-md text-[11px] leading-[14px] text-on-surface-variant top-2 left-4 z-10 pointer-events-none" for="poliklinik">Poliklinik</label>
<select class="floating-select" id="poliklinik" name="poliklinik" required="">
<option disabled="" hidden="" selected="" value=""></option>
<option value="umum">Poliklinik Umum</option>
<option value="gigi">Poliklinik Gigi</option>
<option value="anak">Poliklinik Anak</option>
<option value="jantung">Poliklinik Jantung</option>
</select>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<!-- Password -->
<div class="relative group">
<input class="floating-input" id="password" name="password" placeholder=" " required="" type="password">
<label class="floating-label" for="password">Password</label>
</div>
<!-- Konfirmasi Password -->
<div class="relative group">
<input class="floating-input" id="confirm_password" name="confirm_password" placeholder=" " required="" type="password">
<label class="floating-label" for="confirm_password">Konfirmasi Password</label>
</div>
</div>
<!-- Security Note -->
<div class="flex items-start gap-2 mt-2 px-1">
<span class="material-symbols-outlined text-outline text-[16px]">lock</span>
<p class="font-label-caps text-label-caps text-outline-variant lowercase normal-case">Password harus memiliki minimal 8 karakter, huruf kapital, dan angka untuk keamanan data medis.</p>
</div>
<!-- Submit Button -->
<button onclick="registerAdmin(event)" class="mt-4 w-full h-[48px] bg-primary text-on-primary font-headline-md text-headline-md rounded-DEFAULT hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center shadow-[0px_4px_12px_rgba(0,88,188,0.2)]" type="submit">
                        Daftar Sekarang
                    </button>
</form>
</div>
<!-- Footer Link -->
<div class="bg-surface-container-low p-4 text-center border-t border-surface-dim">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Sudah punya akun? 
                    <a class="text-primary font-semibold hover:text-primary-container hover:underline transition-colors" href="login_admin.html">Masuk</a>
</p>
</div>
</div>
</main>
<script>
function registerAdmin(event) {
    event.preventDefault();
    const name = document.getElementById('nama').value;
    const nip = document.getElementById('nip').value;
    const email = document.getElementById('email').value;
    const pwd = document.getElementById('password').value;
    const confirmPwd = document.getElementById('confirm_password').value;
    
    if (!name || !nip || !email || !pwd) {
        alert('Harap isi semua kolom!');
        return;
    }
    
    if (pwd !== confirmPwd) {
        alert('Password dan Konfirmasi Password tidak cocok!');
        return;
    }
    
    // Save to localStorage
    localStorage.setItem('adminName', name);
    localStorage.setItem('adminNip', nip);
    localStorage.setItem('adminEmail', email);
    localStorage.setItem('adminPassword', pwd);
    
    alert('Registrasi Admin Berhasil! Silakan masuk.');
    window.location.href = 'login_admin.html';
}
</script>
