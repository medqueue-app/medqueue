<!DOCTYPE html><html lang="id"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>Verifikasi Berhasil - MedQueue</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="js/queue.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    primary: "#0062d1",
                    surface: "#ffffff",
                    "surface-variant": "#f2f2f7",
                    "on-surface": "#1c1c1e",
                    "on-surface-variant": "#8e8e93",
                    success: "#34c759",
                    "success-bg": "#eefaf1",
                    outline: "#e5e5ea"
                },
                fontFamily: {
                    sans: ['Inter', 'sans-serif'],
                }
            }
        }
    }
</script>
<style>
    body { font-family: 'Inter', sans-serif; background-color: #f2f2f7; }
    .mobile-container {
        max-width: 480px;
        margin: 0 auto;
        background-color: #ffffff;
        min-height: 100vh;
        box-shadow: 0 0 20px rgba(0,0,0,0.05);
        display: flex;
        flex-col;
        position: relative;
    }
    .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
    
    @keyframes checkmark { from { transform: scale(0); } to { transform: scale(1); } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>
</head>
<body class="antialiased">

<div class="mobile-container flex flex-col items-center justify-center px-6 py-10">
    
    <!-- Success Animation Area -->
    <div class="flex flex-col items-center justify-center w-full mb-8 animate-[slideUp_0.5s_ease-out]">
        <div class="w-24 h-24 rounded-full bg-success-bg flex items-center justify-center mb-6">
            <span class="material-symbols-outlined text-[48px] text-success fill animate-[checkmark_0.4s_ease-out_backwards]">check_circle</span>
        </div>
        
        <h1 class="text-2xl font-bold text-on-surface mb-2">Verifikasi Berhasil</h1>
        <p class="text-[13px] text-on-surface-variant text-center px-4">
            Data pasien telah terverifikasi dan siap dilayani.
        </p>
    </div>

    <!-- Patient Card -->
    <div class="w-full bg-surface rounded-2xl shadow-[0px_4px_16px_rgba(0,0,0,0.06)] border border-outline p-5 mb-8 animate-[slideUp_0.6s_ease-out]">
        <!-- Patient Info -->
        <div class="flex items-center gap-4 mb-6">
            <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center text-primary shrink-0">
                <span class="material-symbols-outlined fill text-[24px]">person</span>
            </div>
            <div>
                <h2 id="verifyPatientName" class="text-[17px] font-bold text-on-surface">Bpk. Ahmad Riyadi</h2>
                <p id="verifyPatientRM" class="text-[13px] text-on-surface-variant font-medium">RM-8829103</p>
            </div>
        </div>
        
        <!-- Divider -->
        <div class="h-px w-full bg-outline mb-5"></div>
        
        <!-- Queue Info -->
        <div class="flex justify-between items-start">
            <div>
                <p class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider mb-1">NOMOR ANTREAN</p>
                <p id="verifyQueueId" class="text-[36px] font-black text-primary leading-none">B-12</p>
            </div>
            <div class="text-right">
                <p class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider mb-2">POLI TUJUAN</p>
                <div class="flex items-center justify-end gap-1.5">
                    <div class="w-2 h-2 rounded-full bg-success"></div>
                    <span id="verifyPoliName" class="text-[15px] font-bold text-on-surface">Poli Umum</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="w-full flex flex-col gap-4 mt-auto md:mt-0 animate-[slideUp_0.7s_ease-out]">
        <button onclick="mulaiPelayanan()" class="w-full bg-primary hover:bg-primary/90 text-white font-semibold text-[16px] py-4 rounded-xl flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
            <span class="material-symbols-outlined fill text-[20px]">play_arrow</span>
            Mulai Pelayanan
        </button>
        <button onclick="window.location.href='dashboard_admin_utama.html'" class="w-full bg-transparent text-primary hover:bg-primary/5 font-semibold text-[15px] py-3 rounded-xl transition-colors">
            Kembali ke Beranda
        </button>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // Load data pasien yang di-scan
    const patientId = localStorage.getItem('scanned_patient_id');
    const patientName = localStorage.getItem('scanned_patient_name');
    const patientPoli = localStorage.getItem('scanned_patient_poli');

    if (patientId && patientName) {
        document.getElementById('verifyPatientName').innerText = patientName;
        document.getElementById('verifyQueueId').innerText = patientId;
        document.getElementById('verifyPoliName').innerText = patientPoli || 'Poli Umum';
        document.getElementById('verifyPatientRM').innerText = 'RM-' + Math.floor(1000000 + Math.random() * 9000000);
    }
});

function mulaiPelayanan() {
    const patientId = localStorage.getItem('scanned_patient_id');
    if (patientId) {
        // Update status antrean ke "Dilayani"
        updateQueueStatus(patientId, 'Dilayani');
        // Simpan waktu mulai pelayanan
        localStorage.setItem('service_start_time', new Date().toISOString());
        // Redirect ke halaman admin sedang melayani
        window.location.href = 'admin_sedang_melayani.html';
    } else {
        window.location.href = 'admin_sedang_melayani.html';
    }
}
</script>
</body></html>
