<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center font-body-md p-container-padding">
<!-- Top Navigation (Suppressed per instructions for linear/transactional screen, but kept minimal wrapper for context if needed, left blank here as it's a success splash) -->
<main class="w-full max-w-md flex flex-col items-center animate-[fadeIn_0.5s_ease-out]">
<!-- Success Animation / Icon -->
<div class="mb-stack-lg flex flex-col items-center relative">
<div class="w-24 h-24 rounded-full bg-success-container flex items-center justify-center shadow-[0px_8px_24px_rgba(22,163,74,0.2)] animate-[scaleIn_0.4s_ease-out_backwards]">
<span class="material-symbols-outlined text-[48px] text-success animate-[checkmark_0.3s_ease-out_0.2s_backwards]">check_circle</span>
</div>
<h1 class="mt-stack-lg font-headline-lg-mobile text-headline-lg-mobile text-center text-on-background">Verifikasi Berhasil</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-base">Data pasien telah terverifikasi dan siap dilayani.</p>
</div>
<!-- Patient Summary Card -->
<div class="w-full bg-surface-container-lowest rounded-xl p-container-padding shadow-[0px_4px_12px_rgba(0,0,0,0.05)] border border-outline-variant/30 flex flex-col gap-stack-md mb-stack-lg animate-[slideUp_0.5s_ease-out_0.1s_backwards]">
<div class="flex items-start gap-stack-md border-b border-surface-variant pb-stack-md">
<div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-on-primary-container">person</span>
</div>
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">Bpk. Ahmad Riyadi</h2>
<p class="font-body-md text-body-md text-on-surface-variant">RM-8829103</p>
</div>
</div>
<div class="grid grid-cols-2 gap-stack-md">
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-outline uppercase tracking-wider mb-1">Nomor Antrean</span>
<span class="font-status-number text-status-number text-primary">B-12<br><br></span>
</div>
<div class="flex flex-col justify-end">
<span class="font-label-caps text-label-caps text-outline uppercase tracking-wider mb-1">Poli Tujuan</span>
<div class="flex items-center gap-2">
<div class="w-3 h-3 rounded-full bg-secondary"></div>
<span class="font-headline-md text-headline-md text-on-surface">Poli Umum</span>
</div>
</div>
</div>
</div>

<div class="w-full flex flex-col gap-stack-md animate-[slideUp_0.5s_ease-out_0.2s_backwards]">
<button onclick="window.location.href='dashboard_pasien.html'" class="w-full h-12 bg-primary hover:bg-primary-container text-on-primary font-headline-md text-headline-md rounded-lg flex items-center justify-center gap-2 transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined text-[20px]">play_arrow</span>
                Mulai Pelayanan
            </button>
<button onclick="window.location.href='login_pasien.html'" class="w-full h-12 bg-transparent text-primary hover:bg-primary-fixed/20 font-headline-md text-headline-md rounded-lg flex items-center justify-center transition-colors active:scale-[0.98]">
                Kembali ke Beranda
            </button>
</div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const storedName = localStorage.getItem('userName');
        if (storedName) {
            document.querySelector('h2.font-headline-md').innerText = storedName;
        }
    });
</script>
</main>
<style>
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes checkmark {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
    </style>
