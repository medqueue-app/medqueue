<!DOCTYPE html><html lang="id"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">

<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    @keyframes pulse-ring { 0% { transform: scale(0.95); opacity: 0.7; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.7; } }
    .animate-pulse-ring { animation: pulse-ring 2s ease-in-out infinite; }
</style>
</head>
<body class="bg-surface text-on-surface font-body-lg min-h-screen flex flex-col">
<header class="fixed top-0 w-full z-50 bg-surface shadow-[0px_4px_12px_rgba(0,0,0,0.05)] flex items-center px-container-padding h-14">
    <button onclick="window.location.href='dashboard_admin_utama.html'" class="text-primary hover:bg-surface-container-high transition-colors p-2 rounded-full active:scale-95 duration-150 flex items-center justify-center mr-2">
        <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <h1 class="font-headline-md text-headline-md text-primary">Sedang Melayani</h1>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-container-padding pt-20 pb-8">
    <div class="mb-8 flex flex-col items-center">
        <div class="relative">
            <div class="w-28 h-28 rounded-full bg-primary/10 flex items-center justify-center animate-pulse-ring">
                <div class="w-20 h-20 rounded-full bg-primary flex items-center justify-center shadow-lg">
                    <span class="material-symbols-outlined text-on-primary text-[40px]" style="font-variation-settings: 'FILL' 1;">medical_services</span>
                </div>
            </div>
        </div>
        <h2 class="mt-6 font-headline-lg-mobile text-headline-lg-mobile text-primary text-center">Pasien Sedang Dilayani</h2>
        <p class="font-body-md text-body-md text-on-surface-variant mt-2 text-center">Pelayanan sedang berlangsung</p>
    </div>
    <div class="w-full max-w-md bg-surface-container-lowest rounded-xl p-container-padding shadow-[0px_4px_12px_rgba(0,0,0,0.05)] border border-outline-variant/30 mb-6">
        <div class="flex items-center gap-4 mb-4 pb-4 border-b border-surface-variant">
            <div class="w-14 h-14 rounded-full bg-primary-fixed flex items-center justify-center shrink-0">
                <span id="adminPatientAvatar" class="font-headline-md text-headline-md text-primary">--</span>
            </div>
            <div>
                <h3 id="adminPatientName" class="font-headline-md text-headline-md text-on-surface">Memuat...</h3>
                <p id="adminPatientPoli" class="font-body-md text-body-md text-on-surface-variant flex items-center gap-1 mt-1">
                    <span class="material-symbols-outlined text-[16px]">stethoscope</span> ---
                </p>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-surface-container-low rounded-lg p-3 text-center">
                <p class="font-label-caps text-label-caps text-on-surface-variant mb-1">Nomor Antrean</p>
                <p id="adminQueueId" class="font-status-number text-status-number text-primary" style="font-size: 36px;">---</p>
            </div>
            <div class="bg-surface-container-low rounded-lg p-3 text-center">
                <p class="font-label-caps text-label-caps text-on-surface-variant mb-1">Waktu Pelayanan</p>
                <p id="serviceTimer" class="font-status-number text-status-number text-secondary" style="font-size: 36px;">00:00</p>
            </div>
        </div>
        <div class="mt-4 p-3 bg-primary-fixed/30 rounded-lg flex items-center gap-3">
            <span class="material-symbols-outlined text-primary">person</span>
            <div>
                <p class="font-label-caps text-label-caps text-on-surface-variant">Dokter</p>
                <p id="adminDoctorName" class="font-body-md text-body-md text-on-surface font-medium">Dr. Sarah Jenkins</p>
            </div>
        </div>
    </div>
    <div class="w-full max-w-md flex flex-col gap-3">
        <button onclick="selesaiPelayanan()" class="w-full h-12 bg-primary hover:bg-surface-tint text-on-primary font-headline-md text-headline-md rounded-lg flex items-center justify-center gap-2 transition-colors active:scale-[0.98] shadow-md">
            <span class="material-symbols-outlined text-[20px]">check_circle</span>
            Selesai Pelayanan
        </button>
        <button onclick="window.location.href='dashboard_admin_utama.html'" class="w-full h-12 bg-transparent text-primary border border-outline-variant font-headline-md text-headline-md rounded-lg flex items-center justify-center transition-colors hover:bg-surface-container-low active:scale-[0.98]">
            Kembali ke Dashboard
        </button>
    </div>
</main>
<script>
let timerInterval;
document.addEventListener('DOMContentLoaded', () => {
    const patientId = localStorage.getItem('scanned_patient_id');
    const patientName = localStorage.getItem('scanned_patient_name');
    const patientPoli = localStorage.getItem('scanned_patient_poli');
    const startTime = localStorage.getItem('service_start_time');
    if (patientId && patientName) {
        document.getElementById('adminPatientName').innerText = patientName;
        document.getElementById('adminQueueId').innerText = patientId;
        document.getElementById('adminPatientPoli').innerHTML = '<span class="material-symbols-outlined text-[16px]">stethoscope</span> ' + (patientPoli || 'Poli Umum');
        const initials = patientName.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
        document.getElementById('adminPatientAvatar').innerText = initials;
        let doc = 'Dr. Sarah Jenkins';
        if (patientPoli && patientPoli.includes('Gigi')) doc = 'Dr. Ronald Cooper';
        else if (patientPoli && patientPoli.includes('Anak')) doc = 'Dr. Amanda Putri, Sp.A';
        document.getElementById('adminDoctorName').innerText = doc;
    }
    if (startTime) {
        timerInterval = setInterval(() => {
            const start = new Date(startTime);
            const now = new Date();
            const diff = Math.floor((now - start) / 1000);
            const mins = String(Math.floor(diff / 60)).padStart(2, '0');
            const secs = String(diff % 60).padStart(2, '0');
            document.getElementById('serviceTimer').innerText = mins + ':' + secs;
        }, 1000);
    }
});
function selesaiPelayanan() {
    const patientId = localStorage.getItem('scanned_patient_id');
    if (patientId) {
        updateQueueStatus(patientId, 'Selesai');
        const startTime = localStorage.getItem('service_start_time');
        if (startTime) {
            const start = new Date(startTime);
            const now = new Date();
            const diffMins = Math.round((now - start) / 60000);
            localStorage.setItem('service_duration', diffMins > 0 ? diffMins : 1);
        }
        clearInterval(timerInterval);
        window.location.href = 'admin_pelayanan_selesai.html';
    }
}
</script>
</body></html>
