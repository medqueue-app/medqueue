<!DOCTYPE html><html lang="id"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>Sedang Melayani - MedQueue</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="js/queue.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    primary: "#0062d1",
                    "primary-light": "#e5f0fa",
                    surface: "#ffffff",
                    "surface-variant": "#f2f2f7",
                    "on-surface": "#1c1c1e",
                    "on-surface-variant": "#8e8e93",
                    success: "#34c759",
                    outline: "#e5e5ea",
                    "outline-variant": "#c7c7cc"
                },
                fontFamily: {
                    sans: ['Inter', 'sans-serif'],
                }
            }
        }
    }
</script>
<style>
    body { font-family: 'Inter', sans-serif; background-color: #f2f2f7; }
    .mobile-container {
        max-width: 480px;
        margin: 0 auto;
        background-color: #f2f2f7;
        min-height: 100vh;
        box-shadow: 0 0 20px rgba(0,0,0,0.05);
        display: flex;
        flex-direction: column;
        position: relative;
    }
    .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
</style>
</head>
<body class="antialiased">

<div class="mobile-container pb-24">
    
    <!-- Top App Bar -->
    <header class="bg-surface px-4 py-4 flex items-center justify-between border-b border-outline sticky top-0 z-10">
        <button class="text-primary p-2 -ml-2 rounded-full hover:bg-surface-variant transition-colors" onclick="window.location.href='dashboard_admin_utama.html'">
            <span class="material-symbols-outlined">menu</span>
        </button>
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
            <h1 class="text-[17px] font-bold text-on-surface">Serving Mode</h1>
        </div>
        <button class="text-primary p-2 -mr-2 rounded-full hover:bg-surface-variant transition-colors">
            <span class="material-symbols-outlined">settings</span>
        </button>
    </header>

    <main class="p-4 flex-1 flex flex-col items-center justify-center">
        <!-- Main Card -->
        <div class="w-full bg-surface rounded-[24px] shadow-[0px_8px_24px_rgba(0,0,0,0.04)] border border-outline overflow-hidden mb-6 relative">
            <!-- Blue Top Line -->
            <div class="h-1.5 w-full bg-primary"></div>
            
            <div class="p-6 relative">
                <!-- Timer Badge (Top Right) -->
                <div class="absolute top-6 right-6 bg-primary-light text-primary px-3 py-1.5 rounded-full flex items-center gap-1.5 border border-primary/10">
                    <span class="material-symbols-outlined text-[16px]">schedule</span>
                    <span id="serviceTimer" class="text-[14px] font-bold tracking-wide font-mono">00:00</span>
                </div>

                <!-- Queue Number -->
                <h2 id="serveQueueId" class="text-[56px] font-black text-on-surface leading-tight mb-1 mt-4">B-12</h2>
                
                <!-- Patient Name -->
                <h3 id="servePatientName" class="text-[20px] font-bold text-on-surface mb-6">Bpk. Ahmad Riyadi</h3>
                
                <!-- Details -->
                <div class="flex flex-col gap-3">
                    <div class="flex items-center gap-3 text-on-surface-variant">
                        <span class="material-symbols-outlined fill text-[20px] text-outline-variant">stethoscope</span>
                        <span id="servePoliName" class="text-[15px] font-medium text-on-surface">Poli Umum</span>
                    </div>
                    <div class="flex items-center gap-3 text-on-surface-variant">
                        <span class="material-symbols-outlined text-[20px] text-outline-variant">id_card</span>
                        <span id="servePatientRM" class="text-[15px] font-medium text-on-surface">RM-8829103</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="w-full flex flex-col gap-3">
            <button onclick="selesaikanPelayanan()" class="w-full bg-primary hover:bg-primary/90 text-white font-semibold text-[16px] py-4 rounded-xl flex items-center justify-center transition-transform active:scale-[0.98] shadow-sm">
                Selesaikan Pelayanan
            </button>
            <button class="w-full bg-surface hover:bg-surface-variant text-primary font-semibold text-[16px] py-4 rounded-xl flex items-center justify-center gap-2 border-2 border-primary/20 transition-colors active:scale-[0.98]">
                <span class="material-symbols-outlined text-[20px]">post_add</span>
                Tambah Catatan Medis
            </button>
        </div>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="bg-surface border-t border-outline fixed bottom-0 w-full max-w-[480px] pb-safe">
        <ul class="flex justify-around items-center h-16">
            <li class="flex-1 flex flex-col items-center justify-center text-on-surface-variant hover:text-primary cursor-pointer transition-colors" onclick="window.location.href='dashboard_admin_utama.html'">
                <span class="material-symbols-outlined text-[24px]">home</span>
                <span class="text-[10px] font-medium mt-1">Dashboard</span>
            </li>
            <li class="flex-1 flex flex-col items-center justify-center text-on-surface-variant hover:text-primary cursor-pointer transition-colors" onclick="window.location.href='scan_barcode_pasien.html'">
                <span class="material-symbols-outlined text-[24px]">qr_code_scanner</span>
                <span class="text-[10px] font-medium mt-1">Scan</span>
            </li>
            <li class="flex-1 flex flex-col items-center justify-center text-primary cursor-pointer transition-colors" onclick="window.location.href='kelola_daftar_antrean.html?poli=Umum'">
                <span class="material-symbols-outlined fill text-[24px]">groups</span>
                <span class="text-[10px] font-medium mt-1">Patients</span>
            </li>
        </ul>
    </nav>
</div>

<script>
let startTime = null;
let timerInterval = null;

document.addEventListener('DOMContentLoaded', () => {
    // Load patient data
    const patientId = localStorage.getItem('scanned_patient_id') || 'B-12';
    const patientName = localStorage.getItem('scanned_patient_name') || 'Bpk. Ahmad Riyadi';
    const patientPoli = localStorage.getItem('scanned_patient_poli') || 'Poli Umum';

    document.getElementById('servePatientName').innerText = patientName;
    document.getElementById('serveQueueId').innerText = patientId;
    document.getElementById('servePoliName').innerText = patientPoli;
    
    // Simulate RM
    document.getElementById('servePatientRM').innerText = 'RM-' + Math.floor(1000000 + Math.random() * 9000000);

    // Initialize Timer
    const savedStartTime = localStorage.getItem('service_start_time');
    if (savedStartTime) {
        startTime = new Date(savedStartTime).getTime();
    } else {
        startTime = new Date().getTime();
        localStorage.setItem('service_start_time', new Date(startTime).toISOString());
    }

    timerInterval = setInterval(updateTimer, 1000);
    updateTimer(); // Initial call
});

function updateTimer() {
    const now = new Date().getTime();
    const distance = now - startTime;
    
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);
    
    const formattedTime = String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
    document.getElementById('serviceTimer').innerText = formattedTime;
}

function selesaikanPelayanan() {
    clearInterval(timerInterval);
    const patientId = localStorage.getItem('scanned_patient_id');
    
    // Save duration for summary
    const duration = document.getElementById('serviceTimer').innerText;
    localStorage.setItem('last_service_duration', duration);
    
    if (patientId) {
        updateQueueStatus(patientId, 'Selesai');
    }
    
    // Redirect to summary screen
    window.location.href = 'admin_pelayanan_selesai.html';
}
</script>
</body></html>
