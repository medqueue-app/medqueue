<!DOCTYPE html><html class="light" lang="en" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>MedQueue - Patient Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface": "#faf9fe",
                    "surface-bright": "#faf9fe",
                    "secondary-fixed": "#c1e8ff",
                    "tertiary": "#8a2bb9",
                    "surface-container-low": "#f4f3f8",
                    "surface-container-high": "#e9e7ed",
                    "primary-fixed-dim": "#adc6ff",
                    "outline": "#717786",
                    "on-primary-container": "#fefcff",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-container": "#fffbff",
                    "on-primary-fixed-variant": "#004493",
                    "primary-fixed": "#d8e2ff",
                    "inverse-surface": "#2f3034",
                    "inverse-on-surface": "#f1f0f5",
                    "on-secondary": "#ffffff",
                    "secondary-container": "#60cdff",
                    "on-surface": "#1a1b1f",
                    "on-secondary-container": "#005572",
                    "primary-container": "#0070eb",
                    "on-tertiary-fixed-variant": "#7201a2",
                    "tertiary-fixed-dim": "#e8b3ff",
                    "on-error": "#ffffff",
                    "on-surface-variant": "#414755",
                    "on-secondary-fixed": "#001e2b",
                    "tertiary-fixed": "#f6d9ff",
                    "primary": "#0058bc",
                    "on-tertiary-fixed": "#310048",
                    "secondary-fixed-dim": "#74d1ff",
                    "on-background": "#1a1b1f",
                    "background": "#faf9fe",
                    "secondary": "#006687",
                    "tertiary-container": "#a649d5",
                    "on-primary": "#ffffff",
                    "surface-tint": "#005bc1",
                    "outline-variant": "#c1c6d7",
                    "error": "#ba1a1a",
                    "error-container": "#ffdad6",
                    "on-primary-fixed": "#001a41",
                    "on-tertiary": "#ffffff",
                    "surface-container": "#eeedf3",
                    "surface-container-highest": "#e3e2e7",
                    "on-secondary-fixed-variant": "#004d67",
                    "surface-variant": "#e3e2e7",
                    "surface-dim": "#dad9df",
                    "inverse-primary": "#adc6ff",
                    "on-error-container": "#93000a"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-lg": "24px",
                    "card-gap": "16px",
                    "stack-sm": "12px",
                    "base": "8px",
                    "container-padding": "20px",
                    "stack-md": "16px"
            },
            "fontFamily": {
                    "body-lg": ["Inter"],
                    "status-number": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "label-caps": ["Inter"]
            },
            "fontSize": {
                    "body-lg": ["17px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "status-number": ["48px", {"lineHeight": "48px", "letterSpacing": "-0.04em", "fontWeight": "800"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["15px", {"lineHeight": "22px", "fontWeight": "400"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}]
            }
          }
        }
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .input-field-focus:focus-within label {
        transform: translateY(-12px) scale(0.85);
        color: #0058bc; /* primary color */
      }
      .input-field-focus input:focus {
        border-color: #0058bc;
        outline: none;
        box-shadow: none;
      }
      .input-has-value label {
        transform: translateY(-12px) scale(0.85);
      }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-lg min-h-screen antialiased flex flex-col md:flex-row">
<!-- Top App Bar (Mobile Only - Transactional Intent limits full nav, but brand presence is needed) -->
<header class="fixed top-0 w-full z-50 bg-surface shadow-[0px_4px_12px_rgba(0,0,0,0.05)] md:hidden">
<div class="flex justify-center items-center px-container-padding h-14 w-full relative">
<!-- Back button for transactional flow -->
<button onclick="window.location.href='login_pasien.html'" class="absolute left-container-padding text-primary hover:bg-surface-container-high transition-colors p-2 rounded-full active:scale-95 duration-150 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="font-headline-md text-headline-md-mobile text-primary">MedLine</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col justify-center items-center px-container-padding pt-20 pb-safe md:py-12 w-full max-w-md mx-auto">
<!-- Header Section -->
<div class="w-full text-center mb-stack-lg">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary mb-2">Create Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Register to manage your medical queues effortlessly.</p>
</div>
<!-- Registration Form Card -->
<div class="w-full bg-surface-container-lowest rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.05)] p-container-padding md:p-8 relative overflow-hidden">
<!-- Subtle decorative element -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-fixed rounded-bl-full opacity-20 -z-0"></div>
<form class="space-y-stack-md relative z-10" id="registrationForm">
<!-- Full Name Input -->
<div class="relative bg-[#E9E9EB] rounded-t-lg border-b-2 border-outline-variant input-field-focus transition-colors duration-200">
<label class="absolute left-4 top-3 text-on-surface-variant font-body-md text-body-md transition-all duration-200 pointer-events-none origin-left" for="fullName">Full Name</label>
<input class="w-full bg-transparent border-none pt-6 pb-2 px-4 font-body-md text-body-md text-on-surface focus:ring-0" id="fullName" name="fullName" oninput="this.parentElement.classList.toggle('input-has-value', this.value.length &gt; 0)" required="" type="text">
</div>
<!-- Phone Input -->
<div class="relative bg-[#E9E9EB] rounded-t-lg border-b-2 border-outline-variant input-field-focus transition-colors duration-200">
<label class="absolute left-4 top-3 text-on-surface-variant font-body-md text-body-md transition-all duration-200 pointer-events-none origin-left" for="phone">Phone Number</label>
<input class="w-full bg-transparent border-none pt-6 pb-2 px-4 font-body-md text-body-md text-on-surface focus:ring-0" id="phone" name="phone" oninput="this.parentElement.classList.toggle('input-has-value', this.value.length &gt; 0)" required="" type="tel">
</div>
<!-- Email Input -->
<div class="relative bg-[#E9E9EB] rounded-t-lg border-b-2 border-outline-variant input-field-focus transition-colors duration-200">
<label class="absolute left-4 top-3 text-on-surface-variant font-body-md text-body-md transition-all duration-200 pointer-events-none origin-left" for="email">Email Address</label>
<input class="w-full bg-transparent border-none pt-6 pb-2 px-4 font-body-md text-body-md text-on-surface focus:ring-0" id="email" name="email" oninput="this.parentElement.classList.toggle('input-has-value', this.value.length &gt; 0)" required="" type="email">
</div>
<!-- Password Input -->
<div class="relative bg-[#E9E9EB] rounded-t-lg border-b-2 border-outline-variant input-field-focus transition-colors duration-200">
<label class="absolute left-4 top-3 text-on-surface-variant font-body-md text-body-md transition-all duration-200 pointer-events-none origin-left" for="password">Password</label>
<input class="w-full bg-transparent border-none pt-6 pb-2 px-4 pr-12 font-body-md text-body-md text-on-surface focus:ring-0" id="password" name="password" oninput="this.parentElement.classList.toggle('input-has-value', this.value.length &gt; 0)" required="" type="password">
<button aria-label="Toggle password visibility" class="absolute right-3 top-3 text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
<!-- Actions -->
<div class="pt-stack-sm flex flex-col gap-4">
<button onclick="event.preventDefault(); if (document.getElementById('fullName').value) { localStorage.setItem('userName', document.getElementById('fullName').value); window.location.href='verifikasi_berhasil.html'; } else { alert('Mohon isi seluruh data.'); }" class="w-full h-[44px] bg-primary text-on-primary rounded-full font-headline-md text-body-md flex items-center justify-center hover:bg-surface-tint active:scale-95 transition-all duration-200 shadow-sm" type="submit">
                        Daftar
                    </button>
<div class="text-center">
<span class="font-body-md text-body-md text-on-surface-variant">Already have an account?</span>
<a class="font-headline-md text-body-md text-primary hover:underline ml-1" href="login_pasien.html">Log in</a>
</div>
</div>
</form>
</div>
<!-- Trust Indicators -->
<div class="mt-8 flex justify-center items-center gap-2 text-on-surface-variant opacity-70">
<span class="material-symbols-outlined text-[16px]" data-icon="lock">lock</span>
<span class="font-label-caps text-label-caps">Secure Registration</span>
</div>
</main>
<script>
        // Simple micro-interaction for password toggle
        document.querySelector('button[aria-label="Toggle password visibility"]').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = this.querySelector('.material-symbols-outlined');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility';
                icon.setAttribute('data-icon', 'visibility');
            } else {
                input.type = 'password';
                icon.textContent = 'visibility_off';
                icon.setAttribute('data-icon', 'visibility_off');
            }
        });
    </script>
</body></html>
