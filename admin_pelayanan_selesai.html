<!DOCTYPE html><html lang="id"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>Pelayanan Selesai - MedQueue</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    primary: "#0062d1",
                    "primary-light": "#e5f0fa",
                    surface: "#ffffff",
                    "surface-variant": "#f2f2f7",
                    "on-surface": "#1c1c1e",
                    "on-surface-variant": "#8e8e93",
                    success: "#34c759",
                    outline: "#e5e5ea",
                    "outline-variant": "#c7c7cc"
                },
                fontFamily: {
                    sans: ['Inter', 'sans-serif'],
                }
            }
        }
    }
</script>
<style>
    body { font-family: 'Inter', sans-serif; background-color: #f2f2f7; }
    .mobile-container {
        max-width: 480px;
        margin: 0 auto;
        background-color: #ffffff;
        min-height: 100vh;
        box-shadow: 0 0 20px rgba(0,0,0,0.05);
        display: flex;
        flex-direction: column;
        position: relative;
    }
    .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
    @keyframes scaleIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>
</head>
<body class="antialiased">

<div class="mobile-container pb-24 px-6 pt-12 flex flex-col items-center">
    
    <!-- Success Graphic -->
    <div class="w-20 h-20 bg-primary rounded-full flex items-center justify-center mb-6 shadow-[0px_8px_24px_rgba(0,98,209,0.3)] animate-[scaleIn_0.4s_ease-out_backwards]">
        <span class="material-symbols-outlined text-[40px] text-white">check</span>
    </div>

    <!-- Headers -->
    <h1 class="text-[22px] font-bold text-on-surface mb-3 animate-[slideUp_0.5s_ease-out_backwards]">Pelayanan Selesai</h1>
    <p class="text-[14px] text-on-surface-variant text-center leading-relaxed mb-8 px-2 animate-[slideUp_0.5s_ease-out_0.1s_backwards]">
        Sesi pelayanan untuk <span id="finishPatientName" class="font-bold text-on-surface">Bpk. Ahmad Riyadi</span> telah berhasil diselesaikan dan dicatat dalam sistem.
    </p>

    <!-- Summary Card -->
    <div class="w-full bg-surface rounded-2xl shadow-[0px_4px_16px_rgba(0,0,0,0.06)] border border-outline overflow-hidden mb-10 animate-[slideUp_0.5s_ease-out_0.2s_backwards]">
        <div class="px-5 py-4 bg-surface-variant/50 border-b border-outline">
            <h3 class="text-[15px] font-bold text-on-surface">Ringkasan Sesi</h3>
        </div>
        
        <div class="p-5 flex flex-col gap-4">
            <div class="flex justify-between items-center">
                <span class="text-[14px] text-on-surface-variant">Pasien</span>
                <span id="summaryPatientName" class="text-[15px] font-bold text-on-surface">Bpk. Ahmad Riyadi</span>
            </div>
            
            <div class="h-px w-full bg-outline/50 border-t border-dashed border-outline"></div>
            
            <div class="flex justify-between items-center">
                <span class="text-[14px] text-on-surface-variant">Nomor Antrean</span>
                <span id="summaryQueueId" class="text-[15px] font-bold text-on-surface">B-12</span>
            </div>
            
            <div class="h-px w-full bg-outline/50 border-t border-dashed border-outline"></div>
            
            <div class="flex justify-between items-center">
                <span class="text-[14px] text-on-surface-variant">Klinik</span>
                <span id="summaryPoli" class="text-[15px] font-bold text-on-surface">Poli Umum</span>
            </div>
            
            <div class="h-px w-full bg-outline/50 border-t border-dashed border-outline"></div>
            
            <div class="flex justify-between items-center">
                <span class="text-[14px] text-on-surface-variant">Durasi</span>
                <span id="summaryDuration" class="text-[15px] font-bold text-on-surface">12 Menit</span>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="w-full flex flex-col gap-4 mt-auto md:mt-0 animate-[slideUp_0.5s_ease-out_0.3s_backwards]">
        <button onclick="window.location.href='dashboard_admin_utama.html'" class="w-full bg-primary hover:bg-primary/90 text-white font-semibold text-[16px] py-4 rounded-xl flex items-center justify-center transition-transform active:scale-[0.98] shadow-sm">
            Kembali ke Antrean
        </button>
        <button onclick="window.location.href='riwayat_antrean_admin.html'" class="w-full bg-transparent text-primary hover:bg-primary/5 font-semibold text-[15px] py-3 rounded-xl transition-colors">
            Lihat Detail Riwayat
        </button>
    </div>

    <!-- Bottom Navigation Bar -->
    <nav class="bg-surface border-t border-outline fixed bottom-0 left-0 right-0 mx-auto max-w-[480px] w-full z-20" style="padding-bottom: max(env(safe-area-inset-bottom), 24px);">
        <ul class="flex justify-around items-center h-16 w-full">
            <li class="flex-1 flex flex-col items-center justify-center text-on-surface-variant hover:text-primary cursor-pointer transition-colors h-full" onclick="window.location.href='dashboard_admin_utama.html'">
                <span class="material-symbols-outlined text-[24px]">home</span>
                <span class="text-[10px] font-medium mt-1">Dashboard</span>
            </li>
            <li class="flex-1 flex flex-col items-center justify-center text-on-surface-variant hover:text-primary cursor-pointer transition-colors h-full" onclick="window.location.href='scan_barcode_pasien.html'">
                <span class="material-symbols-outlined text-[24px]">qr_code_scanner</span>
                <span class="text-[10px] font-medium mt-1">Scan</span>
            </li>
            <li class="flex-1 flex flex-col items-center justify-center text-primary cursor-pointer transition-colors h-full" onclick="window.location.href='kelola_daftar_antrean.html?poli=Umum'">
                <span class="material-symbols-outlined fill text-[24px]">groups</span>
                <span class="text-[10px] font-medium mt-1">Patients</span>
            </li>
        </ul>
    </nav>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // Load patient data
    const patientId = localStorage.getItem('scanned_patient_id') || 'B-12';
    const patientName = localStorage.getItem('scanned_patient_name') || 'Bpk. Ahmad Riyadi';
    const patientPoli = localStorage.getItem('scanned_patient_poli') || 'Poli Umum';
    const durationStr = localStorage.getItem('last_service_duration') || '12:00';
    
    // Parse duration to 'X Menit'
    let durationMinutes = 12;
    if (durationStr.includes(':')) {
        const parts = durationStr.split(':');
        durationMinutes = parseInt(parts[0], 10);
        // if less than 1 min, show 1 menit
        if (durationMinutes === 0) durationMinutes = 1;
    }

    document.getElementById('finishPatientName').innerText = patientName;
    document.getElementById('summaryPatientName').innerText = patientName;
    document.getElementById('summaryQueueId').innerText = patientId;
    document.getElementById('summaryPoli').innerText = patientPoli;
    document.getElementById('summaryDuration').innerText = durationMinutes + ' Menit';
    
    // Clear the active session so the admin is ready for the next one
    localStorage.removeItem('scanned_patient_id');
    localStorage.removeItem('scanned_patient_name');
    localStorage.removeItem('scanned_patient_poli');
    localStorage.removeItem('service_start_time');
});
</script>
</body></html>
