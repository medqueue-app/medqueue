<!DOCTYPE html><html lang="id"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>Riwayat Antrean - MedQueue Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="js/queue.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    primary: "#0062d1",
                    "primary-light": "#e5f0fa",
                    surface: "#ffffff",
                    "surface-variant": "#f2f2f7",
                    "on-surface": "#1c1c1e",
                    "on-surface-variant": "#8e8e93",
                    success: "#34c759",
                    "success-bg": "#eefaf1",
                    error: "#ff3b30",
                    "error-bg": "#ffeceb",
                    outline: "#e5e5ea",
                    "outline-variant": "#c7c7cc"
                },
                fontFamily: {
                    sans: ['Inter', 'sans-serif'],
                }
            }
        }
    }
</script>
<style>
    body { font-family: 'Inter', sans-serif; background-color: #f2f2f7; }
    .mobile-container {
        max-width: 480px;
        margin: 0 auto;
        background-color: #f2f2f7;
        min-height: 100vh;
        min-height: 100dvh;
        box-shadow: 0 0 20px rgba(0,0,0,0.05);
        display: flex;
        flex-direction: column;
        position: relative;
    }
    .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>
<body class="antialiased">

<div class="mobile-container pb-24">
    
    <!-- Top App Bar -->
    <header class="bg-surface px-4 py-4 flex items-center justify-between border-b border-outline sticky top-0 z-10">
        <button class="text-primary p-2 -ml-2 rounded-full hover:bg-surface-variant transition-colors" onclick="window.location.href='dashboard_admin_utama.html'">
            <span class="material-symbols-outlined">menu</span>
        </button>
        <div class="flex items-center gap-2">
            <h1 class="text-[17px] font-bold text-on-surface">Riwayat Antrean</h1>
        </div>
        <div class="w-8 h-8 rounded-full overflow-hidden bg-primary-light" onclick="document.getElementById('adminAvatarUpload').click()">
            <img id="mobileHeaderAvatar" class="w-full h-full object-cover" src="https://ui-avatars.com/api/?name=Admin&background=0062d1&color=fff" alt="Admin">
        </div>
        <input type="file" id="adminAvatarUpload" accept="image/*" class="hidden" onchange="previewAndSaveAdminAvatar(event)">
    </header>

    <main class="p-4 flex-1 overflow-y-auto hide-scrollbar">
        
        <div id="historyContainer" class="space-y-4">
            <!-- Dynamic cards will be injected here -->
        </div>

    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="bg-surface border-t border-outline fixed bottom-0 w-full max-w-[480px] z-20" style="padding-bottom: max(env(safe-area-inset-bottom), 24px);">
        <ul class="flex justify-around items-center h-16 w-full">
            <li class="flex-1 flex flex-col items-center justify-center text-on-surface-variant hover:text-primary cursor-pointer transition-colors h-full" onclick="window.location.href='dashboard_admin_utama.html'">
                <span class="material-symbols-outlined text-[24px]">home</span>
                <span class="text-[10px] font-medium mt-1">Home</span>
            </li>

            <li class="flex-1 flex flex-col items-center justify-center text-primary cursor-pointer transition-colors h-full" onclick="window.location.href='riwayat_antrean_admin.html'">
                <span class="material-symbols-outlined fill text-[24px]">history</span>
                <span class="text-[10px] font-medium mt-1">History</span>
            </li>
            <li class="flex-1 flex flex-col items-center justify-center text-on-surface-variant hover:text-primary cursor-pointer transition-colors h-full" onclick="window.location.href='pengaturan_staf_admin.html'">
                <span class="material-symbols-outlined text-[24px]">person</span>
                <span class="text-[10px] font-medium mt-1">Profile</span>
            </li>
        </ul>
    </nav>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // Sync Avatar and fetch history
    const adminAvatar = localStorage.getItem('adminAvatar');
    if (adminAvatar) {
        const mob = document.getElementById('mobileHeaderAvatar');
        if (mob) mob.src = adminAvatar;
    }
    loadHistory();
});

function loadHistory() {
    const db = typeof getQueueDB === 'function' ? getQueueDB() : null;
    if (!db) return;
    
    // Get logged-in admin's name
    const adminName = localStorage.getItem('adminName') || 'Dr. Sarah Jenkins';
    
    const historyQueues = db.queues.filter(q => q.status === 'Selesai' || q.status === 'Dibatalkan').reverse();
    const container = document.getElementById('historyContainer');
    container.innerHTML = '';
    
    if (historyQueues.length === 0) {
        container.innerHTML = `<div class="text-center p-8 text-on-surface-variant">Belum ada riwayat antrean.</div>`;
        return;
    }

    historyQueues.forEach(q => {
        // Styling and Doctor Mapping based on Poli
        let doctorName = 'Dokter Pemeriksa';
        let icon = 'stethoscope', color = 'primary';
        
        if (q.poliName.includes('Umum')) { doctorName = 'Dr. Nita Astuti'; icon = 'stethoscope'; color = 'primary'; }
        if (q.poliName.includes('Gigi')) { doctorName = 'Dr. Ronald Cooper'; icon = 'dentistry'; color = 'tertiary'; }
        if (q.poliName.includes('Anak')) { doctorName = 'Dr. Rani Mutiara, Sp.A'; icon = 'child_care'; color = 'secondary'; }
        if (q.poliName.includes('Jantung')) { doctorName = 'Dr. Hendra Setiawan, Sp.JP'; icon = 'cardiology'; color = 'secondary'; }

        // Date formatting
        const dateObj = new Date(q.timestamp);
        const dateStr = dateObj.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
        const timeStr = dateObj.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) + ' WIB';

        // Status badge
        const isSelesai = q.status === 'Selesai';
        const badgeClass = isSelesai ? 'bg-success-bg text-success border-success/20' : 'bg-error-bg text-error border-error/20';
        const statusIcon = isSelesai ? 'check_circle' : 'cancel';
        const opacityClass = isSelesai ? '' : 'opacity-80';

        const cardHTML = `
            <div class="bg-surface rounded-2xl p-4 shadow-[0px_2px_8px_rgba(0,0,0,0.04)] border border-outline ${opacityClass}">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="font-bold text-[18px] text-${color} bg-${color}/10 px-2 py-0.5 rounded-md">${q.id}</span>
                            <h3 class="font-bold text-[16px] text-on-surface">${q.patientName}</h3>
                        </div>
                        <p class="text-[13px] text-on-surface-variant mb-1 font-medium">${q.poliName}</p>
                        <p class="text-[12px] text-on-surface-variant flex items-center gap-1">
                            <span class="material-symbols-outlined text-[14px]">calendar_today</span>
                            ${dateStr}, ${timeStr}
                        </p>
                    </div>
                    <span class="${badgeClass} text-[11px] font-bold px-2.5 py-1 rounded-full flex items-center gap-1 border">
                        <span class="material-symbols-outlined text-[12px] fill">${statusIcon}</span> ${q.status}
                    </span>
                </div>
                
                <div class="bg-surface-variant/50 rounded-xl p-3 flex gap-3 items-center mb-4 border border-outline/50">
                    <div class="w-10 h-10 rounded-full bg-primary-light flex items-center justify-center text-primary shrink-0">
                        <span class="material-symbols-outlined fill">${icon}</span>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider mb-0.5">Dokter Pemeriksa</p>
                        <p class="text-[14px] font-semibold text-on-surface">${doctorName}</p>
                    </div>
                </div>
                
                <div class="h-px w-full bg-outline mb-3"></div>
                <button class="w-full text-center text-primary text-[13px] font-semibold hover:opacity-80 transition-opacity">
                    Lihat Detail &gt;
                </button>
            </div>
        `;
        container.innerHTML += cardHTML;
    });
}

function previewAndSaveAdminAvatar(event) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const base64String = e.target.result;
            const mob = document.getElementById('mobileHeaderAvatar');
            if (mob) mob.src = base64String;
            localStorage.setItem('adminAvatar', base64String);
        };
        reader.readAsDataURL(file);
    }
}
</script>
</body></html>
