<script>
document.addEventListener('DOMContentLoaded', () => {
    // Load dynamic user avatar
    const storedAvatar = localStorage.getItem('userAvatar');
    if (storedAvatar) {
        const navIcon = document.getElementById('bottomNavProfileIcon');
        if (navIcon) {
            navIcon.outerHTML = `<img class="w-6 h-6 rounded-full object-cover mb-1 border border-primary/20" src="${storedAvatar}" alt="Avatar">`;
        }
    }
    
    function updateUI() {
        const active = getActiveQueue();
        if (active) {
            document.getElementById('servingPoliName').innerText = active.poliName;
            document.getElementById('servingQueueId').innerText = active.id;
            
            let doc = 'Dr. Sarah Jenkins';
            if (active.poliName.includes('Gigi')) doc = 'Dr. Ronald Cooper';
            else if (active.poliName.includes('Anak')) doc = 'Dr. Amanda Putri, Sp.A';
            
            document.getElementById('servingDoctorName').innerText = doc;
            
            // If status is 'Selesai', auto-redirect to completed page
            if (active.status === 'Selesai') {
                window.location.href = 'pelayanan_selesai_pasien.html';
            } else if (active.status !== 'Dilayani') {
                // If status reverted or changed back, go back to status check page
                window.location.href = 'barcode_status_antrean.html';
            }
        } else {
            // No active queue, go back to dashboard
            window.location.href = 'dashboard_pasien.html';
        }
    }
    
    updateUI();
    // Poll every 3 seconds for changes
    setInterval(updateUI, 3000);
});
</script>
