<body class="bg-background text-on-background min-h-screen flex flex-col font-sans antialiased pb-20 pt-14">
<!-- TopAppBar -->

<!-- Viewfinder Area -->
<div class="relative w-full aspect-square max-w-[320px] rounded-xl overflow-hidden shadow-[0px_8px_24px_rgba(0,0,0,0.12)] bg-black">
<!-- Simulated Camera Feed Placeholder -->
<div class="absolute inset-0 bg-surface-variant flex items-center justify-center opacity-30">
<span class="material-symbols-outlined text-outline text-6xl">videocam</span>
</div>
<!-- Scanning Overlay -->
<div class="absolute inset-0 border-[40px] border-black/50 pointer-events-none"></div>
<!-- Targeting Frame (Corners) -->
<div class="absolute top-10 left-10 w-10 h-10 border-t-4 border-l-4 border-primary rounded-tl-lg pointer-events-none z-10"></div>
<div class="absolute top-10 right-10 w-10 h-10 border-t-4 border-r-4 border-primary rounded-tr-lg pointer-events-none z-10"></div>
<div class="absolute bottom-10 left-10 w-10 h-10 border-b-4 border-l-4 border-primary rounded-bl-lg pointer-events-none z-10"></div>
<div class="absolute bottom-10 right-10 w-10 h-10 border-b-4 border-r-4 border-primary rounded-br-lg pointer-events-none z-10"></div>
<!-- Animated Scan Line -->
<div class="absolute top-10 left-10 right-10 h-0.5 bg-secondary-container shadow-[0_0_8px_2px_rgba(96,205,255,0.6)] z-20" id="scan-line"></div>
</div>

            </p>
</div>

<script>
        // Simple animation for the scan line
        const scanLine = document.getElementById('scan-line');
        if(scanLine) {
            let position = 40;
            let direction = 1;
            const max = 280; // approximate height of viewfinder area
            const min = 40;
            
            setInterval(() => {
                position += 2 * direction;
                if(position >= max) direction = -1;
                if(position <= min) direction = 1;
                scanLine.style.top = `${position}px`;
            }, 16);
        }

        // Simulate scanning and redirect after 2.5s
        setTimeout(() => {
            window.location.href = 'hasil_scan_barcode.html';
        }, 2500);
    </script>
