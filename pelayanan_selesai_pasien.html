<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center font-sans pb-16 md:pb-0">
<!-- Canvas area -->
<main class="w-full max-w-md mx-auto px-container-padding flex-1 flex flex-col justify-center pb-24 md:pb-0">
<div class="flex flex-col items-center text-center mb-stack-lg">
<div class="w-24 h-24 bg-secondary-fixed rounded-full flex items-center justify-center mb-stack-md shadow-[0px_8px_24px_rgba(0,0,0,0.12)]">
<span class="material-symbols-outlined text-[48px] text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-background mb-base">Pelayanan Selesai</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Terima kasih, <span id="successPatientName">Bpk. Ahmad Riyadi</span>.<br>Sesi konsultasi Anda telah selesai dilakukan.</p>
</div>
<div class="bg-surface-container-lowest rounded-xl p-container-padding mb-stack-lg shadow-[0px_4px_12px_rgba(0,0,0,0.05)] border border-outline-variant/30 relative overflow-hidden">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-primary"></div>
<h2 class="font-label-caps text-label-caps text-outline mb-stack-sm tracking-widest uppercase">Ringkasan Kunjungan</h2>
<div class="space-y-stack-sm">
<div class="flex items-start">
<span class="material-symbols-outlined text-primary mr-3 text-xl">medical_services</span>
<div>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase">Poliklinik</p>
<p id="successPoliName" class="font-body-md text-body-md text-on-background font-medium">Poli Umum</p>
</div>
</div>
<div class="flex items-start">
<span class="material-symbols-outlined text-primary mr-3 text-xl">stethoscope</span>
<div>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase">Dokter</p>
<p id="successDoctorName" class="font-body-md text-body-md text-on-background font-medium">Dr. Amanda Putri, Sp.A</p>
</div>
</div>
<div class="flex items-start">
<span class="material-symbols-outlined text-primary mr-3 text-xl">timer</span>
<div>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase">Durasi Pelayanan</p>
<p class="font-body-md text-body-md text-on-background font-medium">15 Menit</p>
</div>
</div>
<div class="flex items-start">
<span class="material-symbols-outlined text-primary mr-3 text-xl">calendar_today</span>
<div>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase">Tanggal</p>
<p id="successDate" class="font-body-md text-body-md text-on-background font-medium">24 Mei 2024</p>
</div>
</div>
</div>
</div>
<div class="flex flex-col space-y-stack-sm">
<button onclick="alert('Terima kasih atas rating Anda!'); selesaiDanBeranda();" class="w-full bg-primary text-on-primary font-body-lg text-body-lg font-semibold py-3 px-4 rounded-full h-[44px] flex items-center justify-center shadow-md transition-opacity hover:opacity-90 active:scale-95">
                Beri Rating Pelayanan
            </button>
<button onclick="selesaiDanBeranda()" class="w-full bg-transparent text-primary border border-primary font-body-lg text-body-lg font-semibold py-3 px-4 rounded-full h-[44px] flex items-center justify-center transition-colors hover:bg-primary/5 active:scale-95">
                Kembali ke Beranda
            </button>
</div>
</main>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // Try to load user name
    const storedName = localStorage.getItem('userName');
    if (storedName) {
        document.getElementById('successPatientName').innerText = storedName;
    }
    
    // Read the queue data to populate details
    const active = getActiveQueue();
    if (active) {
        document.getElementById('successPoliName').innerText = active.poliName;
        
        let doc = 'Dr. Sarah Jenkins';
        if (active.poliName.includes('Gigi')) doc = 'Dr. Ronald Cooper';
        else if (active.poliName.includes('Anak')) doc = 'Dr. Amanda Putri, Sp.A';
        
        document.getElementById('successDoctorName').innerText = doc;
        
        const date = new Date(active.timestamp);
        document.getElementById('successDate').innerText = `${date.getDate()} ${date.toLocaleString('id-ID', { month: 'short' })} ${date.getFullYear()}`;
    }
});

function selesaiDanBeranda() {
    clearActiveQueue(); // Clears key activeQueueId
    window.location.href = 'dashboard_pasien.html';
}
</script>
