<!DOCTYPE html><html lang="id" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Pilih Peran - MedQueue</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet">

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#faf9fe",
                        "surface-bright": "#faf9fe",
                        "secondary-fixed": "#c1e8ff",
                        "tertiary": "#8a2bb9",
                        "surface-container-low": "#f4f3f8",
                        "surface-container-high": "#e9e7ed",
                        "primary-fixed-dim": "#adc6ff",
                        "outline": "#717786",
                        "on-primary-container": "#fefcff",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#fffbff",
                        "on-primary-fixed-variant": "#004493",
                        "primary-fixed": "#d8e2ff",
                        "inverse-surface": "#2f3034",
                        "inverse-on-surface": "#f1f0f5",
                        "on-secondary": "#ffffff",
                        "secondary-container": "#60cdff",
                        "on-surface": "#1a1b1f",
                        "on-secondary-container": "#005572",
                        "primary-container": "#0070eb",
                        "on-tertiary-fixed-variant": "#7201a2",
                        "tertiary-fixed-dim": "#e8b3ff",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#414755",
                        "on-secondary-fixed": "#001e2b",
                        "tertiary-fixed": "#f6d9ff",
                        "primary": "#0058bc",
                        "on-tertiary-fixed": "#310048",
                        "secondary-fixed-dim": "#74d1ff",
                        "on-background": "#1a1b1f",
                        "background": "#faf9fe",
                        "secondary": "#006687",
                        "tertiary-container": "#a649d5",
                        "on-primary": "#ffffff",
                        "surface-tint": "#005bc1",
                        "outline-variant": "#c1c6d7",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#001a41",
                        "on-tertiary": "#ffffff",
                        "surface-container": "#eeedf3",
                        "surface-container-highest": "#e3e2e7",
                        "on-secondary-fixed-variant": "#004d67",
                        "surface-variant": "#e3e2e7",
                        "surface-dim": "#dad9df",
                        "inverse-primary": "#adc6ff",
                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-lg": "24px",
                        "card-gap": "16px",
                        "stack-sm": "12px",
                        "base": "8px",
                        "container-padding": "20px",
                        "stack-md": "16px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "status-number": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "label-caps": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["17px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "status-number": ["48px", {"lineHeight": "48px", "letterSpacing": "-0.04em", "fontWeight": "800"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["15px", {"lineHeight": "22px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],

                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface min-h-screen flex flex-col items-center justify-center p-container-padding font-body-md text-on-surface">
<!-- Header Section -->
<header class="text-center mb-stack-lg max-w-md w-full">
<div class="flex justify-center items-center mb-stack-md">
<span class="material-symbols-outlined text-4xl text-primary mr-2" style="font-variation-settings: 'FILL' 1;">health_and_safety</span>
<h1 class="font-headline-lg md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary">MedLine</h1>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-2">Selamat Datang</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Silakan pilih peran Anda untuk melanjutkan ke sistem antrean.</p>
</header>
<!-- Role Selection Cards -->
<main class="grid grid-cols-1 md:grid-cols-2 gap-card-gap w-full max-w-3xl">
<!-- Patient Card -->
<button onclick="window.location.href='login_pasien.html'" class="group relative flex flex-col items-center justify-center p-8 bg-surface-container-lowest rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.05)] border border-outline-variant/30 hover:shadow-[0px_8px_24px_rgba(0,0,0,0.12)] hover:border-primary/50 transition-all duration-300 transform hover:-translate-y-1 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
<div class="w-20 h-20 rounded-full bg-primary-fixed flex items-center justify-center mb-6 group-hover:bg-primary group-hover:text-on-primary transition-colors duration-300">
<span class="material-symbols-outlined text-4xl text-primary group-hover:text-on-primary transition-colors duration-300" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-3 group-hover:text-primary transition-colors duration-300">Masuk sebagai Pasien</h3>
<p class="font-body-md text-body-md text-on-surface-variant text-center max-w-[250px]">
                Pantau nomor antrean Anda secara real-time dan lihat estimasi waktu panggilan dokter.
            </p>
<div class="absolute inset-0 border-2 border-transparent rounded-xl group-hover:border-primary/10 pointer-events-none transition-colors duration-300"></div>
</button>
<!-- Admin Card -->
<button onclick="window.location.href='login_admin.html'" class="group relative flex flex-col items-center justify-center p-8 bg-surface-container-lowest rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.05)] border border-outline-variant/30 hover:shadow-[0px_8px_24px_rgba(0,0,0,0.12)] hover:border-secondary/50 transition-all duration-300 transform hover:-translate-y-1 focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-2">
<div class="w-20 h-20 rounded-full bg-secondary-fixed flex items-center justify-center mb-6 group-hover:bg-secondary group-hover:text-on-secondary transition-colors duration-300">
<span class="material-symbols-outlined text-4xl text-secondary group-hover:text-on-secondary transition-colors duration-300" style="font-variation-settings: 'FILL' 1;">medical_services</span>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-3 group-hover:text-secondary transition-colors duration-300">Masuk sebagai Admin</h3>
<p class="font-body-md text-body-md text-on-surface-variant text-center max-w-[250px]">
                Kelola aliran pasien, perbarui status antrean ruangan, dan pantau metrik fasilitas medis.
            </p>
<div class="absolute inset-0 border-2 border-transparent rounded-xl group-hover:border-secondary/10 pointer-events-none transition-colors duration-300"></div>
</button>
</main>
<!-- Decorative ambient background glow -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none overflow-hidden -z-10">
<div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[0%] right-[0%] w-[40%] h-[40%] rounded-full bg-secondary/5 blur-[100px]"></div>
</div>
</body></html>
