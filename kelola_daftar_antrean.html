<script>
document.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    let poli = urlParams.get('poli') || 'Umum';
    
    // Normalize
    poli = poli.charAt(0).toUpperCase() + poli.slice(1);
    const fullPoliName = `Poli ${poli}`;
    
    // Set title
    document.getElementById('kelolaTitle').innerText = `Antrean ${fullPoliName}`;
    document.title = `Kelola ${fullPoliName} - MedQueue`;
    
    let activeTab = 'Waiting'; // Waiting, Progress, Completed
    
    // Handle tab clicks
    const tabWaiting = document.getElementById('tabWaiting');
    const tabProgress = document.getElementById('tabProgress');
    const tabCompleted = document.getElementById('tabCompleted');
    
    function setTab(tabName) {
        activeTab = tabName;
        
        // Reset classes
        [tabWaiting, tabProgress, tabCompleted].forEach(btn => {
            btn.className = "flex-1 py-2 text-center rounded-DEFAULT text-on-surface-variant font-label-caps text-label-caps";
        });
        
        if (tabName === 'Waiting') {
            tabWaiting.className = "flex-1 py-2 text-center rounded-DEFAULT bg-surface text-primary font-label-caps text-label-caps shadow-[0px_2px_4px_rgba(0,0,0,0.05)]";
        } else if (tabName === 'Progress') {
            tabProgress.className = "flex-1 py-2 text-center rounded-DEFAULT bg-surface text-primary font-label-caps text-label-caps shadow-[0px_2px_4px_rgba(0,0,0,0.05)]";
        } else if (tabName === 'Completed') {
            tabCompleted.className = "flex-1 py-2 text-center rounded-DEFAULT bg-surface text-primary font-label-caps text-label-caps shadow-[0px_2px_4px_rgba(0,0,0,0.05)]";
        }
        
        renderQueueList();
    }
    
    tabWaiting.addEventListener('click', () => setTab('Waiting'));
    tabProgress.addEventListener('click', () => setTab('Progress'));
    tabCompleted.addEventListener('click', () => setTab('Completed'));
    
    // Render the list of patients
    function renderQueueList() {
        const container = document.getElementById('queueListContainer');
        container.innerHTML = '';
        
        const db = getQueueDB();
        
        // Filter by Poli
        let filtered = db.queues.filter(q => q.poliName === fullPoliName);
        
        // Filter by Tab Status
        if (activeTab === 'Waiting') {
            filtered = filtered.filter(q => q.status === 'Menunggu' || q.status === 'Hampir Tiba');
        } else if (activeTab === 'Progress') {
            filtered = filtered.filter(q => q.status === 'Dilayani');
        } else if (activeTab === 'Completed') {
            filtered = filtered.filter(q => q.status === 'Selesai');
        }
        
        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="bg-surface rounded-lg shadow-[0px_4px_12px_rgba(0,0,0,0.05)] p-8 text-center text-on-surface-variant border border-[#E5E5EA]">
                    Tidak ada antrean dalam kategori ini.
                </div>
            `;
            return;
        }
        
        filtered.forEach(q => {
            let leftBorderColor = 'bg-primary';
            if (q.status === 'Hampir Tiba') leftBorderColor = 'bg-warning';
            if (q.status === 'Dilayani') leftBorderColor = 'bg-secondary';
            if (q.status === 'Selesai') leftBorderColor = 'bg-success';
            
            // Build card
            const card = document.createElement('div');
            card.className = `bg-surface rounded-lg shadow-[0px_4px_12px_rgba(0,0,0,0.05)] overflow-hidden relative border border-[#E5E5EA]`;
            if (q.status === 'Hampir Tiba') card.className += ' animate-pulse border-amber-200';
            
            // Actions based on status
            let actionsHtml = '';
            if (q.status === 'Menunggu') {
                actionsHtml = `
                    <button onclick="changeStatus('${q.id}', 'Hampir Tiba')" class="bg-primary text-on-primary font-label-caps text-label-caps px-4 py-2 rounded-full hover:bg-primary-container transition-colors min-h-[44px] flex items-center justify-center">
                        Panggil Antrean
                    </button>
                `;
            } else if (q.status === 'Hampir Tiba') {
                actionsHtml = `
                    <button onclick="changeStatus('${q.id}', 'Dilayani')" class="bg-primary text-on-primary font-label-caps text-label-caps px-4 py-2 rounded-full hover:bg-primary-container transition-colors min-h-[44px] flex items-center justify-center flex-row">
                        <span class="material-symbols-outlined mr-2 text-[18px]">volume_up</span>
                        <span>Memanggil... Mulai Layani</span>
                    </button>
                `;
            } else if (q.status === 'Dilayani') {
                actionsHtml = `
                    <button onclick="changeStatus('${q.id}', 'Selesai')" class="bg-green-600 text-on-primary font-label-caps text-label-caps px-4 py-2 rounded-full hover:bg-green-700 transition-colors min-h-[44px] flex items-center justify-center">
                        Selesaikan Pelayanan
                    </button>
                `;
            } else if (q.status === 'Selesai') {
                actionsHtml = `
                    <span class="text-green-600 font-bold text-sm flex items-center gap-1">
                        <span class="material-symbols-outlined">check_circle</span> Selesai
                    </span>
                `;
            }
            
            card.innerHTML = `
                <div class="absolute left-0 top-0 bottom-0 w-1 ${leftBorderColor}"></div>
                <div class="p-4 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-16 text-center">
                            <span class="font-status-number text-status-number text-on-surface">${q.id}</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="font-headline-md text-headline-md text-on-surface">${q.patientName}</span>
                            <div class="flex items-center gap-1 text-on-surface-variant mt-1">
                                <span class="material-symbols-outlined text-[16px]">schedule</span>
                                <span class="font-body-md text-body-md">Status: ${q.status}</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-2">
                        ${actionsHtml}
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }
    
    // Global function to change queue status
    window.changeStatus = function(queueId, newStatus) {
        updateQueueStatus(queueId, newStatus);
        renderQueueList();
    };
    
    // Initial render
    setTab('Waiting');
});
</script>
